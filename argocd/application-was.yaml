apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: community-was
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"   # web보다 먼저 배포
spec:
  project: default

  source:
    repoURL: https://github.com/LeeSangheee/community.git
    targetRevision: main
    path: was

  destination:
    server: https://kubernetes.default.svc
    namespace: was

  syncPolicy:
    automated:
      prune: true       # 삭제된 리소스 자동 정리
      selfHeal: true    # 수동 변경 감지 시 GitOps 상태로 복원
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
